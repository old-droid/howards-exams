name: Generate MIT-Level Exam PDFs

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install TeX Live
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended texlive-science texlive-fonts-extra

      - name: Install opencode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Generate exam Python script via opencode
        run: |
          opencode run --file .opencode/tasks/generate-exams.md \
            --dangerously-skip-permissions \
            "Generate the Python exam generation script as described"

      - name: Loop courses — generate PDFs one by one
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          COURSES=$(node -e "
            const c = require('fs').readFileSync('js/data.js','utf8');
            const m = c.match(/code:\s*'([^']+)'/g);
            console.log(m.map(s=>s.match(/'([^']+)'/)[1]).join(' '));
          ")

          TIMESTAMP=$(date '+%Y-%m')

          for code in $COURSES; do
            echo "=== Generating $code ==="
            python3 scripts/generate_exam.py "$code" || echo "WARN: $code failed"

            git add exams/
            git commit -m "exam($code): ${TIMESTAMP}" || true
            git push || echo "WARN: push failed for $code"
            echo "=== $code done ==="
          done
