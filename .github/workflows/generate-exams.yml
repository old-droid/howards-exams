name: Generate MIT-Level Exam PDFs

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install TeX Live
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended texlive-science texlive-fonts-extra

      - name: Install opencode binary
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Generate exam papers via opencode
        run: |
          opencode run --file .opencode/tasks/generate-exams.md \
            --dangerously-skip-permissions \
            "Generate 25-question extremely hard MIT-level exam PDFs for all 70 courses as described in the attached prompt"

      - name: Count generated papers
        id: count
        run: |
          tex_count=$(find exams -name '*.tex' 2>/dev/null | wc -l)
          pdf_count=$(find exams -name '*.pdf' 2>/dev/null | wc -l)
          echo "TeX files: $tex_count"
          echo "PDF files: $pdf_count"
          echo "tex_files=$tex_count" >> $GITHUB_OUTPUT
          echo "pdf_files=$pdf_count" >> $GITHUB_OUTPUT

      - name: Commit and push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add exams/ scripts/
          TIMESTAMP=$(date '+%Y-%m')
          git commit -m "chore(exams): monthly exam papers — ${TIMESTAMP}" || echo "No changes to commit"
          git push
